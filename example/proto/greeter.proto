syntax = "proto3";

// NOTE: intentionally no `option go_package` and a bare package name —
// these get filled in by the generator's managed mode via CLI flags.
package greeter.v1;

import "google/api/annotations.proto";
import "buf/validate/validate.proto";
import "openapiv3/annotations.proto";
import "protogen/authz/authz.proto";

service Greeter {
  // Methods without their own (protogen.authz.requires) stay public.
  option (protogen.authz.default_requires) = { public: true };

  // Unary RPC with a REST/HTTP mapping consumed by the gateway + OpenAPI.
  rpc SayHello(HelloRequest) returns (HelloReply) {
    option (google.api.http) = {
      post: "/v1/greeter/hello"
      body: "*"
    };
    // openapi.v3 annotations customize the OpenAPI output for this operation.
    option (openapi.v3.operation) = {
      summary: "Send a greeting"
      tags: ["greetings"]
    };
    // Enforced by authz.UnaryServerInterceptor — see the authz package.
    option (protogen.authz.requires) = {
      roles: { any_of: ["admin", "greeter"] }
      permissions: { all_of: ["greetings.write"] }
    };
  }

  rpc GetGreeting(GetGreetingRequest) returns (HelloReply) {
    option (google.api.http) = {
      get: "/v1/greeter/{name}"
    };
  }
}

message HelloRequest {
  // protovalidate constraints: enforced at runtime, no codegen needed.
  string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 40}];
  int32 times = 2 [(buf.validate.field).int32 = {gte: 1, lte: 10}];
}

message GetGreetingRequest {
  string name = 1 [(buf.validate.field).string.min_len = 1];
}

message HelloReply {
  string message = 1;
}
