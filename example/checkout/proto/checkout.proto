syntax = "proto3";

// No option go_package here either — managed mode fills it in.
package shop.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

// Checkout demonstrates a single POST endpoint exercising a broad range of
// protovalidate constraints, optional fields, enums, nested and repeated
// messages — and the OpenAPI + validation output they produce.
service Checkout {
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse) {
    option (google.api.http) = {
      post: "/v1/orders"
      body: "*"
    };
  }
}

enum Currency {
  CURRENCY_UNSPECIFIED = 0;
  USD = 1;
  EUR = 2;
  GBP = 3;
}

enum ShippingSpeed {
  SHIPPING_SPEED_UNSPECIFIED = 0;
  STANDARD = 1;
  EXPRESS = 2;
}

message PlaceOrderRequest {
  // required + email format
  string customer_email = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.email = true
  ];

  // length bounds
  string customer_name = 2 [(buf.validate.field).string = {min_len: 2, max_len: 60}];

  // uuid format
  string idempotency_key = 3 [(buf.validate.field).string.uuid = true];

  // regex pattern
  string promo_note = 4 [(buf.validate.field).string.pattern = "^[A-Za-z0-9 ]{0,64}$"];

  // enum: must be a defined value and not the zero/unspecified one
  Currency currency = 5 [(buf.validate.field).enum = {defined_only: true, not_in: [0]}];

  // repeated with collection bounds; at least one item
  repeated LineItem items = 6 [(buf.validate.field).repeated = {min_items: 1, max_items: 50}];

  // numeric range
  int32 discount_percent = 7 [(buf.validate.field).int32 = {gte: 0, lte: 100}];

  // proto3 optional — present-or-absent, and NOT required
  optional string coupon_code = 8 [(buf.validate.field).string.max_len = 20];

  // enum, defined values only
  ShippingSpeed shipping_speed = 9 [(buf.validate.field).enum.defined_only = true];

  // nested message, required
  Address shipping_address = 10 [(buf.validate.field).required = true];

  // must be true to proceed
  bool accept_terms = 11 [(buf.validate.field).bool.const = true];

  // free-form optional timestamp (no constraint) — shows a well-known message field
  google.protobuf.Timestamp requested_delivery = 12;

  // field_behavior: write-only + required (never echoed back; must be supplied)
  string payment_token = 13 [
    (google.api.field_behavior) = INPUT_ONLY,
    (google.api.field_behavior) = REQUIRED
  ];
}

message LineItem {
  string sku = 1 [(buf.validate.field).string = {min_len: 1, pattern: "^[A-Z0-9-]+$"}];
  int32 quantity = 2 [(buf.validate.field).int32.gte = 1];
  double unit_price = 3 [(buf.validate.field).double.gt = 0];
}

message Address {
  string line1 = 1 [(buf.validate.field).string.min_len = 1];
  string city = 2 [(buf.validate.field).string.min_len = 1];
  string country = 3 [(buf.validate.field).string.len = 2]; // ISO-3166 alpha-2
  string postal_code = 4 [(buf.validate.field).string = {min_len: 3, max_len: 10}];
}

message PlaceOrderResponse {
  // field_behavior: server-assigned, read-only in the API surface
  string order_id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  Currency currency = 2;
}
